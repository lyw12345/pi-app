name: Publish to npm
on:
  push:
    tags:
      - v0.7.0
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Switch deps
        run: |
          sed -i -E 's|"@earendil-works/pi-ai": "file:[^"]*"|"@earendil-works/pi-ai": "^0.78.0"|' package.json
          sed -i -E 's|"@earendil-works/pi-coding-agent": "file:[^"]*"|"@earendil-works/pi-coding-agent": "^0.78.0"|' package.json
          npm install --no-audit --no-fund
      - run: node_modules/.bin/tsc --noEmit
      - run: npm run test:run
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
